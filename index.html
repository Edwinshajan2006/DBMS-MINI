<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Event Management System | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a14;
            overflow: hidden;
            position: relative;
        }

        /* Animated background orbs */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: float 8s ease-in-out infinite;
        }

        .orb1 {
            width: 500px;
            height: 500px;
            background: #6c3bff;
            top: -150px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb2 {
            width: 400px;
            height: 400px;
            background: #1e8fff;
            bottom: -100px;
            right: -80px;
            animation-delay: 3s;
        }

        .orb3 {
            width: 300px;
            height: 300px;
            background: #ff3b8b;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: 6s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) scale(1);
            }

            50% {
                transform: translateY(-30px) scale(1.05);
            }
        }

        /* Grid overlay */
        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-radius: 24px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.5);
        }

        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #6c3bff, #1e8fff);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            font-size: 28px;
            box-shadow: 0 8px 32px rgba(108, 59, 255, 0.4);
        }

        .brand h1 {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.3px;
        }

        .brand p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.45);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: all 0.25s ease;
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-group input:focus {
            border-color: #6c3bff;
            background: rgba(108, 59, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(108, 59, 255, 0.2);
        }

        .role-select-wrapper {
            position: relative;
        }

        .role-select-wrapper select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            appearance: none;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .role-select-wrapper select:focus {
            border-color: #6c3bff;
            box-shadow: 0 0 0 3px rgba(108, 59, 255, 0.2);
        }

        .role-select-wrapper select option {
            background: #1a1a2e;
            color: #fff;
        }

        .role-select-wrapper::after {
            content: '▾';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            margin-top: 8px;
            background: linear-gradient(135deg, #6c3bff, #1e8fff);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 24px rgba(108, 59, 255, 0.4);
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(108, 59, 255, 0.55);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 24px 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            white-space: nowrap;
        }

        .guest-btn {
            display: block;
            width: 100%;
            padding: 13px;
            text-align: center;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.25s ease;
        }

        .guest-btn:hover {
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        .error-msg {
            display: none;
            background: rgba(255, 59, 90, 0.15);
            border: 1px solid rgba(255, 59, 90, 0.3);
            border-radius: 10px;
            padding: 10px 14px;
            font-size: 13px;
            color: #ff6b8a;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="login-card">
        <div class="brand">
            <div class="brand-icon">🎪</div>
            <h1>EventHub</h1>
            <p>Event Management System</p>
        </div>

        <div class="error-msg" id="errorMsg">Invalid credentials. Please try again.</div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required
                    autocomplete="off" />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required />
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <div class="role-select-wrapper">
                    <select id="role" name="role">
                        <option value="admin">Administrator</option>
                        <option value="organiser">Organiser</option>
                        <option value="participant">Participant</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-login">Sign In →</button>
        </form>

        <div class="divider"><span>or continue as</span></div>
        <a href="dashboard.html" class="guest-btn">👤 Guest / Demo Mode</a>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            // Demo credentials
            if (u === 'admin' && p === 'admin123') {
                window.location.href = 'dashboard.html';
            } else {
                const msg = document.getElementById('errorMsg');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
            }
        }
    </script>
</body>

</html>
